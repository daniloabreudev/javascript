<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora do dia</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body >
    <header>
        <h1>Verificador de Idade</h1>
    </header>
    <section id="caixa-verificadora">
        <div id="Nascimento">
            <label for="iano">Ano de Nascimento:</label>
            <input type="number" name="iano" id="iano" min="1900" max="2026">
        </div>
        <div id="sexo">Sexo:
            <input type="radio" name="sexo" id="isexfem">
            <label for="isexfem">Feminino</label>
            <input type="radio" name="sexo" id="isexmas">
            <label for="isexmas">Masculino</label>
        </div>
        <div id="botao">
            <button onclick="verificar()">Verificar</button>
        </div>
        <div id="mensagem">
            Preencha os dados acima para ver o resultado!
        </div>
    </section>
    <footer>
        <p><a href="https://github.com/daniloabreudev" target="_blank">@Daniloabreudev</a></p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
